name: Update DSA Progress

on:
  push:
    branches:
      - main

jobs:
  update-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run progress update script
        run: python update_progress.py

      - name: Commit updated progress.md
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add progress.md
          git commit -m "Auto-update DSA progress" || echo "No changes to commit"
          git push